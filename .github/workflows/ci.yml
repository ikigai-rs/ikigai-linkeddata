# CI for the linkeddata workspace (ikigai-rdf / ikigai-sniff / ikigai-sparql).
# These crates are published AND compiled to wasm32 for client-side transrept/
# SPARQL in the browser (see .cargo/config.toml), so CI checks both faces:
# native --all-targets + tests, and a wasm lib build so browser drift can't slip
# into the publish cascade unnoticed.
name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2

      - name: fmt
        run: cargo fmt --all -- --check

      - name: clippy (native, all targets)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: test
        run: cargo test --workspace

      # The browser face: every workspace lib must still compile to wasm32
      # (getrandom wasm_js backend comes from .cargo/config.toml).
      - name: clippy (wasm lib)
        run: cargo clippy --workspace --lib --target wasm32-unknown-unknown -- -D warnings
